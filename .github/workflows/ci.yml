name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/standalone/
          retention-days: 7

  # Build for PWA/Static export (optional - requires removing API routes)
  build-pwa:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create static config
        run: |
          cat > next.config.static.ts << 'EOF'
          import type { NextConfig } from "next";
          
          const nextConfig: NextConfig = {
            output: "export",
            trailingSlash: true,
            images: {
              unoptimized: true,
            },
            typescript: {
              ignoreBuildErrors: true,
            },
            reactStrictMode: false,
          };
          
          export default nextConfig;
          EOF
          cp next.config.static.ts next.config.ts

      - name: Build static export
        run: npm run build
        continue-on-error: true

      - name: Check build result
        run: |
          if [ -d "out" ]; then
            echo "✅ Static export successful"
          else
            echo "⚠️ Static export requires API routes to be removed"
            echo "Use Vercel deployment for full functionality"
          fi
