name: Mobile Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        required: true
        default: true
        type: boolean

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prepare static build (remove API routes)
        run: |
          # Remove API routes - incompatible with static export
          rm -rf src/app/api
          
          # Create static Next.js config
          cat > next.config.ts << 'NEXTCONFIG'
          import type { NextConfig } from "next";
          const nextConfig: NextConfig = {
            output: "export",
            trailingSlash: true,
            images: { unoptimized: true },
            typescript: { ignoreBuildErrors: true },
            reactStrictMode: false,
          };
          export default nextConfig;
          NEXTCONFIG

      - name: Build static app
        run: npx next build

      - name: Initialize Capacitor
        run: |
          npx cap init "eBook Reader Pro" "com.ebookreader.pro" --web-dir out || true
          npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android || true

      - name: Build Android APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
        continue-on-error: true

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: ignore

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android
        continue-on-error: true

      - name: Check artifacts
        id: check
        run: |
          if ls artifacts/android/*.apk 1> /dev/null 2>&1; then
            echo "has_apk=true" >> $GITHUB_OUTPUT
          else
            echo "has_apk=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/android/*.apk
          generate_release_notes: true
          draft: true
          body: |
            ## 📱 eBook Reader Pro
            
            ### Features:
            - 📚 EPUB, PDF, TXT, MD, MOBI, AZW3, FB2, DJVU Support
            - 🎨 Comic/Manga Reader (CBZ, CBR, CB7, CBT, ACV)
            - 🤖 KI-Zusammenfassungen & Chat
            - 🔊 Text-to-Speech
            - ☁️ Cloud-Sync
            - ♿ Barrierefreiheit
            
            ### Installation:
            - **Android**: APK herunterladen und installieren
            - **Web**: https://marco4192-ui.github.io/ebook-reader/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
