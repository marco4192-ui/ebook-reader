name: Mobile Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        required: true
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS IPA'
        required: true
        default: false
        type: boolean

jobs:
  build-android:
    runs-on: ubuntu-latest
    if: github.event.inputs.build_android == 'true' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Create static config for mobile
        run: |
          cat > next.config.static.ts << 'EOF'
          import type { NextConfig } from "next";
          
          const nextConfig: NextConfig = {
            output: "export",
            trailingSlash: true,
            images: {
              unoptimized: true,
            },
            typescript: {
              ignoreBuildErrors: true,
            },
            reactStrictMode: false,
          };
          
          export default nextConfig;
          EOF
          cp next.config.static.ts next.config.ts

      - name: Build static app
        run: npm run build
        continue-on-error: true

      - name: Check build output
        id: check
        run: |
          if [ -d "out" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "::warning::Static build failed"
          fi

      - name: Initialize Capacitor
        if: steps.check.outputs.success == 'true'
        run: |
          npx cap init "eBook Reader Pro" "com.ebookreader.pro" --web-dir out || true
          npx cap add android || true

      - name: Sync Capacitor
        if: steps.check.outputs.success == 'true'
        run: npx cap sync android || true

      - name: Build Android APK
        if: steps.check.outputs.success == 'true'
        run: |
          cd android
          ./gradlew assembleDebug
        continue-on-error: true

      - name: Upload Android APK
        if: steps.check.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: ignore

  build-ios:
    runs-on: macos-latest
    if: github.event.inputs.build_ios == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create static config for mobile
        run: |
          cat > next.config.static.ts << 'EOF'
          import type { NextConfig } from "next";
          
          const nextConfig: NextConfig = {
            output: "export",
            trailingSlash: true,
            images: {
              unoptimized: true,
            },
            typescript: {
              ignoreBuildErrors: true,
            },
            reactStrictMode: false,
          };
          
          export default nextConfig;
          EOF
          cp next.config.static.ts next.config.ts

      - name: Build static app
        run: npm run build
        continue-on-error: true

      - name: Check build output
        id: check
        run: |
          if [ -d "out" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Initialize Capacitor
        if: steps.check.outputs.success == 'true'
        run: |
          npx cap init "eBook Reader Pro" "com.ebookreader.pro" --web-dir out || true
          npx cap add ios || true

      - name: Sync Capacitor
        if: steps.check.outputs.success == 'true'
        run: npx cap sync ios || true

      - name: Build iOS App
        if: steps.check.outputs.success == 'true'
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -archivePath build/App.xcarchive archive
        continue-on-error: true

      - name: Upload iOS IPA
        if: steps.check.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/App/build/*.ipa
          retention-days: 30
          if-no-files-found: ignore

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android
        continue-on-error: true

      - name: Check artifacts
        id: check
        run: |
          if [ -f "artifacts/android/"*.apk ]; then
            echo "has_apk=true" >> $GITHUB_OUTPUT
          else
            echo "has_apk=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.check.outputs.has_apk == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/android/*.apk
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (no artifacts)
        if: steps.check.outputs.has_apk != 'true'
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: true
          body: |
            ## ⚠️ Mobile build requires configuration
            
            For mobile builds, the app needs to be configured without API routes for static export.
            
            ### Alternative deployment options:
            - **Web App**: Deploy to Vercel for full functionality
            - **PWA**: Install from browser on mobile device
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
