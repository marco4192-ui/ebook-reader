name: Mobile Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        required: true
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS IPA'
        required: true
        default: false
        type: boolean

jobs:
  build-android:
    runs-on: ubuntu-latest
    if: github.event.inputs.build_android == 'true' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prepare static build
        run: |
          # Move API routes out of app directory (incompatible with static export)
          mkdir -p .api-backup
          mv src/app/api .api-backup/ 2>/dev/null || true
          
          # Create static config
          cat > next.config.ts << 'EOF'
          import type { NextConfig } from "next";
          
          const nextConfig: NextConfig = {
            output: "export",
            trailingSlash: true,
            images: {
              unoptimized: true,
            },
            typescript: {
              ignoreBuildErrors: true,
            },
            reactStrictMode: false,
          };
          
          export default nextConfig;
          EOF
          
          # Update package.json build script for static export
          sed -i 's/next build && cp -r .next\/static .next\/standalone\/.next\/ && cp -r public .next\/standalone\//next build/' package.json

      - name: Build static app
        run: npm run build

      - name: Restore API routes
        run: |
          mv .api-backup/api src/app/ 2>/dev/null || true
          rm -rf .api-backup

      - name: Initialize Capacitor
        run: |
          npx cap init "eBook Reader Pro" "com.ebookreader.pro" --web-dir out || true
          npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android || true

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug
        continue-on-error: true

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: ignore

  build-ios:
    runs-on: macos-latest
    if: github.event.inputs.build_ios == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare static build
        run: |
          # Move API routes out of app directory (incompatible with static export)
          mkdir -p .api-backup
          mv src/app/api .api-backup/ 2>/dev/null || true
          
          # Create static config
          cat > next.config.ts << 'EOF'
          import type { NextConfig } from "next";
          
          const nextConfig: NextConfig = {
            output: "export",
            trailingSlash: true,
            images: {
              unoptimized: true,
            },
            typescript: {
              ignoreBuildErrors: true,
            },
            reactStrictMode: false,
          };
          
          export default nextConfig;
          EOF
          
          # Update package.json build script for static export
          sed -i '' 's/next build && cp -r .next\/static .next\/standalone\/.next\/ && cp -r public .next\/standalone\//next build/' package.json

      - name: Build static app
        run: npm run build

      - name: Restore API routes
        run: |
          mv .api-backup/api src/app/ 2>/dev/null || true
          rm -rf .api-backup

      - name: Initialize Capacitor
        run: |
          npx cap init "eBook Reader Pro" "com.ebookreader.pro" --web-dir out || true
          npx cap add ios || true

      - name: Sync Capacitor
        run: npx cap sync ios || true

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -archivePath build/App.xcarchive archive
        continue-on-error: true

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: ios/App/build/*.ipa
          retention-days: 30
          if-no-files-found: ignore

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android
        continue-on-error: true

      - name: Check artifacts
        id: check
        run: |
          if ls artifacts/android/*.apk 1> /dev/null 2>&1; then
            echo "has_apk=true" >> $GITHUB_OUTPUT
          else
            echo "has_apk=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/android/*.apk
          generate_release_notes: true
          draft: true
          body: |
            ## 📱 eBook Reader Pro Release
            
            ### Installation:
            - **Android**: Lade die APK herunter und installiere sie
            - **PWA**: Besuche die Web-App und installiere sie über den Browser
            - **Web**: https://github.com/marco4192-ui/ebook-reader
            
            ### Features:
            - 📚 EPUB, PDF, TXT, MD, MOBI, AZW3, FB2, DJVU Support
            - 🎨 Comic/Manga Reader (CBZ, CBR, CB7, CBT, ACV)
            - 🤖 KI-Zusammenfassungen & Chat
            - 🔊 Text-to-Speech
            - ☁️ Cloud-Sync
            - ♿ Barrierefreiheit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
