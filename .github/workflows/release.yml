name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          npm version ${{ github.event.inputs.version }} -m "chore: release v%s"
          git push origin HEAD
          git push origin --tags

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "## eBook Reader Pro v${VERSION}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Changes:" >> RELEASE_NOTES.md
          git log --pretty=format:"- %s" HEAD~5..HEAD >> RELEASE_NOTES.md || echo "- New release" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Deployment:" >> RELEASE_NOTES.md
          echo "- **PWA**: https://marco4192-ui.github.io/ebook-reader/" >> RELEASE_NOTES.md
          echo "- **Android APK**: Available in this release" >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
