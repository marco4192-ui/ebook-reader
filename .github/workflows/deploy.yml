name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build server version (with API routes)
  build-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for server
        run: npm run build

      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: .next/standalone/
          retention-days: 7

  # Deploy to Vercel (supports API routes)
  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build-server
    continue-on-error: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  # Deploy to GitHub Pages (static, no API routes)
  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-server
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare static build (remove API routes)
        run: |
          # Remove API routes - incompatible with static export
          rm -rf src/app/api
          
          # Create static Next.js config
          cat > next.config.ts << 'NEXTCONFIG'
          import type { NextConfig } from "next";
          const nextConfig: NextConfig = {
            output: "export",
            trailingSlash: true,
            images: { unoptimized: true },
            typescript: { ignoreBuildErrors: true },
            reactStrictMode: false,
          };
          export default nextConfig;
          NEXTCONFIG

      - name: Build static export
        run: npx next build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
