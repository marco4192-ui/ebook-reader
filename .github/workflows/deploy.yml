name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production (server)
        run: npm run build

      - name: Upload server build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: .next/standalone/
          retention-days: 7

  # Deploy to Vercel (recommended - supports API routes)
  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.inputs.environment == 'production'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        continue-on-error: true

      - name: Vercel deployment status
        if: steps.vercel.outcome == 'success'
        run: echo "✅ Deployed to Vercel successfully!"
        
      - name: Vercel deployment skipped
        if: steps.vercel.outcome != 'success'
        run: echo "ℹ️ Vercel deployment skipped (configure secrets to enable)"

  # Static build for GitHub Pages (limited - no API routes)
  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create static pages config
        run: |
          cat > next.config.static.ts << 'EOF'
          import type { NextConfig } from "next";
          
          const nextConfig: NextConfig = {
            output: "export",
            trailingSlash: true,
            images: {
              unoptimized: true,
            },
            typescript: {
              ignoreBuildErrors: true,
            },
            reactStrictMode: false,
          };
          
          export default nextConfig;
          EOF
          cp next.config.static.ts next.config.ts

      - name: Build static export
        run: npm run build
        continue-on-error: true

      - name: Check if build succeeded
        id: check-build
        run: |
          if [ -d "out" ]; then
            echo "build_success=true" >> $GITHUB_OUTPUT
          else
            echo "build_success=false" >> $GITHUB_OUTPUT
            echo "::warning::Static build failed - GitHub Pages deployment skipped"
          fi

      - name: Setup Pages
        if: steps.check-build.outputs.build_success == 'true'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: steps.check-build.outputs.build_success == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: Deploy to GitHub Pages
        if: steps.check-build.outputs.build_success == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Pages deployment status
        if: steps.check-build.outputs.build_success != 'true'
        run: |
          echo "::notice::GitHub Pages deployment requires removing API routes for static export."
          echo "::notice::Use Vercel deployment for full functionality with API routes."
